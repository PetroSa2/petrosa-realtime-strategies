name: CI Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pipeline:
    name: CI Pipeline
    uses: PetroSa2/petrosa_k8s/.github/workflows/ci-pipeline.yml@main
    with:
      service-name: 'realtime-strategies'
      image-name: 'yurisa2/petrosa-realtime-strategies'
      python-version: '3.11'
      skip-docker-build: true
    secrets: inherit
