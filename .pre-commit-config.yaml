# Golden Pre-Commit Configuration for Petrosa (v3.0)
# Use: copy to .pre-commit-config.yaml in any Petrosa repo

repos:
  # ==================================================================
  # CODE QUALITY - Ruff (Latest v0.9.9)
  # ==================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        name: ⚡ Ruff Linter & Fixer
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ⚡ Ruff Formatter

  # ==================================================================
  # TYPE CHECKING - Mypy (Latest v1.15.0)
  # NOTE: 376+ pre-existing mypy errors across 26 files prevent commits.
  # Commented out until pre-existing type errors are resolved (separate ticket).
  # ==================================================================
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.15.0
  #   hooks:
  #     - id: mypy
  #       name: 🔍 Mypy Type Checker
  #       additional_dependencies: [
  #         'pyyaml',
  #         'types-PyYAML',
  #         'types-requests',
  #         'types-setuptools',
  #         'pydantic'
  #       ]
  #       args: [--ignore-missing-imports, --strict]

  # ==================================================================
  # SECURITY - Gitleaks (Official Hook)
  # ==================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: 🔐 Gitleaks (Secret Detection)

  # ==================================================================
  # SECURITY - Bandit (Latest v1.7.8)
  # ==================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: 🔐 Bandit (Python Security)
        args: [-ll, -r, ., -x, ".venv,./.venv,venv,./venv,htmlcov"]
        exclude: ^tests/
        pass_filenames: false

  # ==================================================================
  # SECURITY - Dependency Check (Safety)
  # NOTE: Safety v3.0.1 hook is broken (git checkout v3.0.1 fails).
  # Commented out until pyupio/safety publishes a working hook revision.
  # ==================================================================
  # - repo: https://github.com/pyupio/safety
  #   rev: v3.0.1
  #   hooks:
  #     - id: safety
  #       name: 🔐 Safety (Dependency Scan)
  #       args: [check, --full-report]
  #       files: ^requirements\.txt$

  # ==================================================================
  # LINTING - YAML & TOML
  # ==================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: 📋 YAML Linter

  # ==================================================================
  # STANDARD HOOKS
  # ==================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-ast
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # ==================================================================
  # LOCAL PETROSA HOOKS
  # ==================================================================
  - repo: local
    hooks:
      - id: check-test-assertions
        name: 🧪 Check Test Assertions
        entry: python3 scripts/check-test-assertions.py
        language: system
        types: [python]
        files: ^tests/
